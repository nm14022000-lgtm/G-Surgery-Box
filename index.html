<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q Revision</title>
  <style>
    :root {
      --bg: #090b10;
      --panel: #111620;
      --panel-2: #171d29;
      --card: #1d2432;
      --ink: #f5f7fb;
      --muted: #9aa6b8;
      --line: rgba(255,255,255,0.12);
      --accent: #43d4a4;
      --accent-2: #203b33;
      --danger: #ff6b6b;
      --shadow: 0 22px 55px rgba(0,0,0,0.42);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 8%, rgba(67,212,164,0.14), transparent 28rem),
        radial-gradient(circle at 88% 18%, rgba(91,141,239,0.13), transparent 24rem),
        var(--bg);
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 32px;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand { display: flex; align-items: center; gap: 11px; }

    .brand-mark {
      width: 38px; height: 38px;
      display: grid; place-items: center;
      border-radius: 12px;
      background: linear-gradient(145deg, var(--accent), #6ea8ff);
      color: #07100d;
      font-size: 16px; font-weight: 900;
    }

    h1 { font-size: 20px; line-height: 1.1; }

    .brand p, .muted, .deck-sub, .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .status-pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    /* ── Buttons ── */
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      padding: 0 13px;
      font-size: 12px;
      font-weight: 800;
      transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn.primary { background: var(--accent); color: #07100d; border-color: transparent; }
    .btn.danger { color: #ffd2d2; border-color: rgba(255,107,107,0.34); background: rgba(255,107,107,0.09); }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; }

    /* ── Screens ── */
    .screen { display: none; animation: show 0.18s ease both; }
    .screen.active { display: block; }
    @keyframes show { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Home / Subjects screen ── */
    .home-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 22px;
    }

    .home-header h2 { font-size: clamp(22px, 3vw, 32px); line-height: 1.06; margin-bottom: 5px; }

    /* Subject grid */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .subject-card {
      min-height: 158px;
      border-radius: var(--radius);
      padding: 14px;
      color: #fff;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03)),
        var(--subj-bg, #1d2432);
      border: 1px solid rgba(255,255,255,0.10);
      text-align: left;
      overflow: hidden;
      position: relative;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: var(--shadow);
    }

    .subject-card::after {
      content: "";
      position: absolute;
      width: 90px; height: 120px;
      right: -26px; top: 16px;
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 14px;
      transform: rotate(-14deg);
      background: rgba(255,255,255,0.12);
    }

    .subject-card:hover { transform: translateY(-3px); box-shadow: 0 28px 60px rgba(0,0,0,0.5); }

    .subject-badge {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: 10px;
      background: rgba(255,255,255,0.45);
      font-weight: 900; font-size: 14px;
      color: inherit;
      margin-bottom: 12px;
    }

    .subject-card h3 { font-size: 15px; line-height: 1.2; margin-bottom: 6px; max-width: 110px; }
    .subject-card p { font-size: 11px; opacity: 0.75; }

    /* ── Box Question Screen ── */
    .bq-screen-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .bq-screen-head-left { display: flex; align-items: center; gap: 10px; }

    .bq-back-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--muted);
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 800;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.15s ease;
    }
    .bq-back-btn:hover { background: rgba(255,255,255,0.1); color: var(--ink); }

    .bq-subject-name {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
    }

    .bq-subject-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--subj-accent, var(--accent));
      display: inline-block;
      margin-right: 6px;
      flex-shrink: 0;
    }

    /* Controls row */
    .box-controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .box-mode-toggles, .box-actions { display: flex; gap: 8px; }

    .box-management-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .box-meta {
      color: var(--muted);
      font-size: 12.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .box-meta::after {
      content: "";
      flex-grow: 1;
      height: 1px;
      background: var(--line);
      margin-left: 10px;
    }

    /* Box Card */
    .box-card {
      border: 1px solid var(--line);
      background: rgba(23, 29, 41, 0.65);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      transition: border-color 0.2s ease;
    }
    .box-card:hover { border-color: rgba(255,255,255,0.16); }

    .box-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .box-card-number { color: var(--muted); }

    .box-card-action-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      border-radius: 6px;
      transition: all 0.15s ease;
    }
    .box-card-action-btn:hover { background: rgba(255,255,255,0.08); color: var(--ink); }
    .box-card-action-btn.delete-btn:hover { background: rgba(255,107,107,0.15); color: var(--danger); }

    .box-card-body { display: flex; flex-direction: column; gap: 14px; }

    .box-q-text {
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--ink);
    }

    .box-ans-toggle-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      padding: 5px 11px;
      font-size: 11px;
      font-weight: 800;
      margin-top: 8px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .box-ans-toggle-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }

    .box-ans-content { margin-top: 10px; display: none; animation: show 0.2s ease both; }
    .box-ans-content.active { display: block; }

    .box-ans-bullet {
      font-size: 13.5px;
      color: #edf2fb;
      line-height: 1.5;
      margin-bottom: 5px;
      padding-left: 14px;
      position: relative;
    }
    .box-ans-bullet::before {
      content: "•";
      position: absolute; left: 0;
      color: var(--subj-accent, var(--accent));
      font-weight: bold;
    }

    .box-answer-block { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; margin-top: 4px; }

    .box-nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }
    .box-nav-row span { font-size: 13px; font-weight: 800; color: var(--muted); }

    .box-questions-block { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }

    /* Modals */
    .box-modal {
      position: fixed; inset: 0; z-index: 100;
      display: none; align-items: center; justify-content: center;
      padding: 16px;
      background: rgba(4,6,10,0.85);
      backdrop-filter: blur(8px);
    }
    .box-modal.active { display: flex; }

    .box-modal-content {
      width: min(540px, 100%);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(17,22,32,0.95);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      padding: 20px;
      animation: show 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .box-modal-content h3 {
      font-size: 18px; font-weight: 900;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px; margin-bottom: 14px;
    }

    .editor-grid { display: grid; gap: 9px; }

    label { display: grid; gap: 5px; color: var(--muted); font-size: 11px; font-weight: 800; }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(0,0,0,0.24);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
      font-size: 13px;
    }
    textarea { min-height: 92px; resize: vertical; line-height: 1.45; }

    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .notice { min-height: 22px; color: var(--accent); font-size: 12px; font-weight: 800; margin-top: 8px; }

    /* Subject modal */
    .subject-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

    /* Responsive */
    @media (max-width: 640px) {
      .topbar { flex-direction: column; align-items: flex-start; }
      .app { width: min(100% - 18px, 1180px); padding-top: 14px; }
      .status-pill { white-space: normal; }
      .actions { width: 100%; }
      .actions .btn { flex: 1 1 calc(50% - 8px); }
      .subject-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .subject-card { min-height: 136px; }
      .bq-screen-head { flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 420px) {
      .subject-grid { grid-template-columns: 1fr; }
      .actions .btn { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">Q</div>
        <div>
          <h1>Q Revision</h1>
          <p>Subject-based box question revision tool.</p>
        </div>
      </div>
      <div class="status-pill" id="syncStatus">Loading…</div>
    </header>

    <!-- ── Home: Subject list ── -->
    <section class="screen active" id="homeScreen">
      <div class="home-header">
        <div>
          <h2>Subjects</h2>
          <p class="muted" id="totalStat"></p>
        </div>
        <div class="actions">
          <button class="btn primary" id="btnAddSubject" type="button">+ Add Subject</button>
        </div>
      </div>
      <div class="subject-grid" id="subjectGrid"></div>
    </section>

    <!-- ── Box Question screen (per subject) ── -->
    <section class="screen" id="bqScreen">
      <div class="bq-screen-head">
        <div class="bq-screen-head-left">
          <button class="bq-back-btn" id="btnBqBack" type="button">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Subjects
          </button>
          <div>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="bq-subject-dot" id="bqSubjectDot"></span>
              <span class="bq-subject-name" id="bqSubjectName"></span>
            </div>
            <p class="muted" id="bqSubjectMeta"></p>
          </div>
        </div>
        <div class="actions">
          <button class="btn" id="btnEditSubject" type="button">Edit Subject</button>
          <button class="btn danger" id="btnDeleteSubject" type="button">Delete Subject</button>
        </div>
      </div>

      <!-- Controls -->
      <div class="box-controls-row">
        <div class="box-mode-toggles">
          <button class="btn active" id="btnOneAtTime" type="button">One at a time</button>
          <button class="btn" id="btnAllCards" type="button">All cards</button>
        </div>
        <div class="box-actions">
          <button class="btn" id="btnBoxShuffle" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:4px;vertical-align:middle;"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>Shuffle
          </button>
          <button class="btn" id="btnBoxToggleAnswers" type="button">Show all answers</button>
        </div>
      </div>

      <!-- Management -->
      <div class="box-management-row">
        <button class="btn primary" id="btnBoxAddCard" type="button">+ Add Card</button>
        <button class="btn" id="btnBoxBulkAdd" type="button">Bulk Add Cards</button>
      </div>

      <div class="box-meta">
        <span id="boxMetaText">Showing 0 cards</span>
      </div>

      <div id="boxCardsView"></div>

      <div class="box-nav-row" id="boxNavRow" style="display:none;">
        <button class="btn" id="btnBoxPrev" type="button">← Prev</button>
        <span id="boxNavProgress">0 / 0</span>
        <button class="btn primary" id="btnBoxNext" type="button">Next →</button>
      </div>
    </section>
  </main>

  <!-- Add/Edit Card Modal -->
  <div class="box-modal" id="boxEditorModal">
    <div class="box-modal-content">
      <h3 id="boxEditorTitle">Add New Card</h3>
      <div class="editor-grid" style="margin-top:14px;">
        <label>
          Question (newlines for sub-questions)
          <textarea id="boxEditorQuestion" placeholder="a) Sub-question 1&#10;b) Sub-question 2"></textarea>
        </label>
        <label>
          Answer (newlines for bullet points)
          <textarea id="boxEditorAnswer" placeholder="a) Answer for 1&#10;b) Answer for 2"></textarea>
        </label>
        <div class="split" style="margin-top:10px;">
          <button class="btn primary" id="btnBoxEditorSave" type="button">Save</button>
          <button class="btn" id="btnBoxEditorCancel" type="button">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bulk Add Modal -->
  <div class="box-modal" id="boxBulkModal">
    <div class="box-modal-content">
      <h3>Bulk Add Cards</h3>
      <div class="editor-grid" style="margin-top:14px;">
        <label>
          Format: question|answer;question|answer
          <textarea id="boxBulkInput" placeholder="What is appendicitis?|Inflammation of the appendix;Causes of hernia?|Weak abdominal wall, raised IAP" style="min-height:120px;"></textarea>
        </label>
        <div class="split" style="margin-top:10px;">
          <button class="btn primary" id="btnBoxBulkSave" type="button">Add Cards</button>
          <button class="btn" id="btnBoxBulkCancel" type="button">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Subject Modal -->
  <div class="box-modal" id="subjectModal">
    <div class="box-modal-content" style="max-width:420px;">
      <h3 id="subjectModalTitle">Add Subject</h3>
      <div class="editor-grid" style="margin-top:14px;">
        <label>
          Subject Name
          <input type="text" id="subjectNameInput" placeholder="e.g. Surgery">
        </label>
        <div class="subject-modal-grid">
          <label>
            Card Color
            <input type="color" id="subjectColorInput" value="#43d4a4" style="height:44px;padding:4px;cursor:pointer;">
          </label>
          <label>
            Letter / Icon
            <input type="text" id="subjectLetterInput" placeholder="S" maxlength="2" style="text-align:center;font-size:20px;font-weight:900;">
          </label>
        </div>
        <div class="split" style="margin-top:10px;">
          <button class="btn primary" id="btnSubjectSave" type="button">Save</button>
          <button class="btn" id="btnSubjectCancel" type="button">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCf5VA_uIc9Rmh1Zx0H4WA9k5H9ii4iswc",
      authDomain: "g-surgery.firebaseapp.com",
      projectId: "g-surgery",
      storageBucket: "g-surgery.firebasestorage.app",
      messagingSenderId: "756027528373",
      appId: "1:756027528373:web:ef9c49cc21eb3eb3811afc",
      measurementId: "G-S44M1JWL08"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const dataDoc = doc(db, "qrevision", "main");
    analyticsSupported().then(ok => ok && getAnalytics(firebaseApp)).catch(() => {});

    const storageKey = "q-revision-v1";
    let firebaseReady = false;
    let remoteLoaded = false;

    // ── Default subjects ──
    const defaultSubjects = [
      { id: "surgery",  name: "Surgery",    letter: "S", color: "#c43f74" },
      { id: "medicine", name: "Medicine",   letter: "M", color: "#2275b8" },
      { id: "gynae",    name: "Gynae & Obs",letter: "G", color: "#7652b8" },
      { id: "eye",      name: "Eye",        letter: "E", color: "#16855f" },
      { id: "ent",      name: "ENT",        letter: "N", color: "#b77715" },
      { id: "paedi",    name: "Paediatrics",letter: "P", color: "#b84b35" },
    ];

    function makeDefaultData() {
      return defaultSubjects.map(s => ({
        ...s,
        cards: []
      }));
    }

    // ── State ──
    let subjects = loadLocal() || makeDefaultData();
    let activeSubjectId = null;
    let boxMode = 'one';
    let currentBoxCards = [];
    let boxCardIndex = 0;
    const boxAnswersShown = new Set();
    let boxGlobalAnswersRevealed = false;
    let editingCardId = null;
    let editingSubjectId = null; // for subject modal

    // ── Firebase ──
    onSnapshot(dataDoc, snap => {
      firebaseReady = true;
      document.getElementById("syncStatus").textContent = "Firebase connected";
      if (!remoteLoaded && snap.exists() && Array.isArray(snap.data().subjects)) {
        subjects = snap.data().subjects;
        remoteLoaded = true;
        renderAll();
      }
    }, () => {
      document.getElementById("syncStatus").textContent = "Local ready";
    });

    function saveData() {
      localStorage.setItem(storageKey, JSON.stringify(subjects));
      if (firebaseReady) {
        setDoc(dataDoc, { subjects, updatedAt: Date.now() }).catch(() => {
          document.getElementById("syncStatus").textContent = "Saved locally";
        });
      }
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function uid(p) { return p + "-" + Math.random().toString(36).slice(2, 9); }

    function activeSubject() { return subjects.find(s => s.id === activeSubjectId); }

    // ── Screen switch ──
    function showScreen(name) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(name + "Screen").classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // ── Render home ──
    function renderHome() {
      const grid = document.getElementById("subjectGrid");
      grid.innerHTML = "";
      subjects.forEach(subj => {
        const qCount = subj.cards.length;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "subject-card";
        btn.style.setProperty("--subj-bg", subj.color);
        btn.innerHTML = `
          <div class="subject-badge">${escapeHtml(subj.letter || subj.name[0] || "S")}</div>
          <h3>${escapeHtml(subj.name)}</h3>
          <p>${qCount} question${qCount !== 1 ? "s" : ""}</p>
        `;
        btn.addEventListener("click", () => openSubject(subj.id));
        grid.appendChild(btn);
      });
      const total = subjects.reduce((s, subj) => s + subj.cards.length, 0);
      document.getElementById("totalStat").textContent =
        subjects.length + " subject" + (subjects.length !== 1 ? "s" : "") + " · " + total + " total questions";
    }

    // ── Open subject → go to bq screen ──
    function openSubject(id) {
      activeSubjectId = id;
      const subj = activeSubject();
      if (!subj) return;
      // Set CSS accent
      document.documentElement.style.setProperty("--subj-accent", subj.color);
      // Update header
      document.getElementById("bqSubjectDot").style.background = subj.color;
      document.getElementById("bqSubjectName").textContent = subj.name;
      // Reset state
      boxMode = 'one';
      boxCardIndex = 0;
      boxAnswersShown.clear();
      boxGlobalAnswersRevealed = false;
      document.getElementById("btnOneAtTime").classList.add("active");
      document.getElementById("btnAllCards").classList.remove("active");
      document.getElementById("btnBoxToggleAnswers").textContent = "Show all answers";
      loadBoxCards();
      renderBqScreen();
      showScreen("bq");
    }

    function loadBoxCards() {
      const subj = activeSubject();
      currentBoxCards = subj ? [...subj.cards] : [];
      boxCardIndex = Math.max(0, Math.min(boxCardIndex, currentBoxCards.length - 1));
    }

    function renderBqScreen() {
      const subj = activeSubject();
      document.getElementById("bqSubjectMeta").textContent =
        subj ? subj.cards.length + " question" + (subj.cards.length !== 1 ? "s" : "") : "";

      document.getElementById("btnOneAtTime").classList.toggle("active", boxMode === 'one');
      document.getElementById("btnAllCards").classList.toggle("active", boxMode === 'all');
      document.getElementById("btnBoxToggleAnswers").textContent =
        boxGlobalAnswersRevealed ? "Hide all answers" : "Show all answers";
      document.getElementById("boxMetaText").textContent = "Showing " + currentBoxCards.length + " cards";

      const cardsView = document.getElementById("boxCardsView");
      cardsView.innerHTML = "";

      if (currentBoxCards.length === 0) {
        cardsView.innerHTML = `<div style="text-align:center;color:var(--muted);padding:50px 10px;font-size:14px;">No questions yet — add your first card above.</div>`;
        document.getElementById("boxNavRow").style.display = "none";
        return;
      }

      if (boxMode === 'one') {
        document.getElementById("boxNavRow").style.display = "flex";
        document.getElementById("boxNavProgress").textContent = (boxCardIndex + 1) + " / " + currentBoxCards.length;
        document.getElementById("btnBoxPrev").disabled = boxCardIndex === 0;
        document.getElementById("btnBoxNext").disabled = boxCardIndex === currentBoxCards.length - 1;
        cardsView.appendChild(createBoxCardEl(currentBoxCards[boxCardIndex], boxCardIndex));
      } else {
        document.getElementById("boxNavRow").style.display = "none";
        currentBoxCards.forEach((card, idx) => cardsView.appendChild(createBoxCardEl(card, idx)));
      }
    }

    function splitQuestionLines(raw) {
      const byNewline = raw.split('\n').map(l => l.trim()).filter(Boolean);
      if (byNewline.length > 1) return byNewline;
      const inlinePattern = /(?=[a-z]\)[\s]|[0-9]+[\.\)][\s])/gi;
      const parts = raw.split(inlinePattern).map(p => p.trim()).filter(Boolean);
      if (parts.length > 1) return parts;
      return byNewline.length ? byNewline : [raw.trim()];
    }

    function parseAnswer(value) {
      const byNewline = value.split(/\n|\u2022/).map(v => v.trim()).filter(Boolean);
      if (byNewline.length > 1) return byNewline;
      const inlinePattern = /(?=[a-z]\)[\s]|[0-9]+[\.\)][\s])/gi;
      const parts = value.split(inlinePattern).map(p => p.trim()).filter(Boolean);
      return parts.length > 1 ? parts : byNewline;
    }

    function createBoxCardEl(card, idx) {
      const qLines = splitQuestionLines(card.q);
      const subj = activeSubject();
      const accentColor = subj ? subj.color : "var(--accent)";

      const cardEl = document.createElement("article");
      cardEl.className = "box-card";
      cardEl.style.setProperty("--subj-accent", accentColor);

      cardEl.innerHTML = `
        <div class="box-card-header">
          <span style="color:${escapeHtml(accentColor)};display:flex;align-items:center;gap:6px;">
            <span style="width:8px;height:8px;border-radius:50%;background:${escapeHtml(accentColor)};display:inline-block;"></span>
            ${escapeHtml(subj ? subj.name : "")}
          </span>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="box-card-action-btn edit-btn" type="button" title="Edit">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="box-card-action-btn delete-btn" type="button" title="Delete">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
            <span class="box-card-number">Q ${idx + 1}</span>
          </div>
        </div>
        <div class="box-card-body"></div>
      `;

      cardEl.querySelector(".edit-btn").addEventListener("click", () => openCardEditor(card.id));
      cardEl.querySelector(".delete-btn").addEventListener("click", () => {
        if (confirm("Delete this card?")) deleteCard(card.id);
      });

      const bodyEl = cardEl.querySelector(".box-card-body");

      // Questions
      const qWrap = document.createElement("div");
      qWrap.className = "box-questions-block";
      qLines.forEach(line => {
        const el = document.createElement("div");
        el.className = "box-q-text";
        el.textContent = line;
        qWrap.appendChild(el);
      });
      bodyEl.appendChild(qWrap);

      // Answer toggle
      const allAns = card.a || [];
      if (allAns.length > 0) {
        const ansKey = card.id;
        const isShown = boxGlobalAnswersRevealed || boxAnswersShown.has(ansKey);

        const ansWrap = document.createElement("div");
        ansWrap.className = "box-answer-block";

        const toggleBtn = document.createElement("button");
        toggleBtn.type = "button";
        toggleBtn.className = "box-ans-toggle-btn";
        toggleBtn.textContent = isShown ? "Hide answer" : "Answer";

        const ansContent = document.createElement("div");
        ansContent.className = "box-ans-content" + (isShown ? " active" : "");
        allAns.forEach(a => {
          const bullet = document.createElement("div");
          bullet.className = "box-ans-bullet";
          bullet.textContent = a;
          ansContent.appendChild(bullet);
        });

        toggleBtn.addEventListener("click", () => {
          const active = ansContent.classList.toggle("active");
          toggleBtn.textContent = active ? "Hide answer" : "Answer";
          if (active) boxAnswersShown.add(ansKey);
          else boxAnswersShown.delete(ansKey);
        });

        ansWrap.appendChild(toggleBtn);
        ansWrap.appendChild(ansContent);
        bodyEl.appendChild(ansWrap);
      }

      return cardEl;
    }

    // ── Card CRUD ──
    function openCardEditor(cardId = null) {
      editingCardId = cardId;
      const qInput = document.getElementById("boxEditorQuestion");
      const aInput = document.getElementById("boxEditorAnswer");
      document.getElementById("boxEditorTitle").textContent = cardId ? "Edit Card" : "Add New Card";

      if (cardId) {
        const card = (activeSubject()?.cards || []).find(c => c.id === cardId);
        if (card) {
          qInput.value = card.q;
          aInput.value = card.a.join("\n");
        }
      } else {
        qInput.value = "";
        aInput.value = "";
      }
      document.getElementById("boxEditorModal").classList.add("active");
    }

    function closeCardEditor() {
      document.getElementById("boxEditorModal").classList.remove("active");
    }

    function saveCard() {
      const subj = activeSubject();
      if (!subj) return;
      const q = document.getElementById("boxEditorQuestion").value.trim();
      const a = parseAnswer(document.getElementById("boxEditorAnswer").value);
      if (!q || a.length === 0) {
        alert("Please provide a question and at least one answer line.");
        return;
      }

      if (editingCardId) {
        const card = subj.cards.find(c => c.id === editingCardId);
        if (card) { card.q = q; card.a = a; }
      } else {
        subj.cards.push({ id: uid("card"), q, a });
      }

      saveData();
      loadBoxCards();
      renderBqScreen();
      renderHome();
      closeCardEditor();
    }

    function deleteCard(cardId) {
      const subj = activeSubject();
      if (!subj) return;
      const idx = subj.cards.findIndex(c => c.id === cardId);
      if (idx !== -1) {
        subj.cards.splice(idx, 1);
        boxCardIndex = Math.max(0, boxCardIndex - 1);
        saveData();
        loadBoxCards();
        renderBqScreen();
        renderHome();
      }
    }

    // ── Bulk add ──
    function openBulkModal() {
      document.getElementById("boxBulkInput").value = "";
      document.getElementById("boxBulkModal").classList.add("active");
    }

    function closeBulkModal() {
      document.getElementById("boxBulkModal").classList.remove("active");
    }

    function saveBulk() {
      const subj = activeSubject();
      if (!subj) return;
      const raw = document.getElementById("boxBulkInput").value.trim();
      if (!raw) { alert("Paste bulk cards first."); return; }

      const parsed = raw.split(";").map(p => p.trim()).filter(Boolean).map(pair => {
        const splitAt = pair.indexOf("|");
        if (splitAt === -1) return null;
        const q = pair.slice(0, splitAt).trim();
        const a = parseAnswer(pair.slice(splitAt + 1).trim());
        if (!q || a.length === 0) return null;
        return { id: uid("card"), q, a };
      }).filter(Boolean);

      if (!parsed.length) { alert("Use format: question|answer;question|answer"); return; }

      subj.cards.push(...parsed);
      saveData();
      loadBoxCards();
      renderBqScreen();
      renderHome();
      closeBulkModal();
    }

    // ── Subject CRUD ──
    function openSubjectModal(subjId = null) {
      editingSubjectId = subjId;
      document.getElementById("subjectModalTitle").textContent = subjId ? "Edit Subject" : "Add Subject";
      if (subjId) {
        const subj = subjects.find(s => s.id === subjId);
        if (subj) {
          document.getElementById("subjectNameInput").value = subj.name;
          document.getElementById("subjectColorInput").value = subj.color || "#43d4a4";
          document.getElementById("subjectLetterInput").value = subj.letter || subj.name[0] || "";
        }
      } else {
        document.getElementById("subjectNameInput").value = "";
        document.getElementById("subjectColorInput").value = "#43d4a4";
        document.getElementById("subjectLetterInput").value = "";
      }
      document.getElementById("subjectModal").classList.add("active");
    }

    function closeSubjectModal() {
      document.getElementById("subjectModal").classList.remove("active");
    }

    function saveSubject() {
      const name = document.getElementById("subjectNameInput").value.trim();
      const color = document.getElementById("subjectColorInput").value;
      const letter = document.getElementById("subjectLetterInput").value.trim() || name[0]?.toUpperCase() || "S";

      if (!name) { alert("Please enter a subject name."); return; }

      if (editingSubjectId) {
        const subj = subjects.find(s => s.id === editingSubjectId);
        if (subj) { subj.name = name; subj.color = color; subj.letter = letter; }
      } else {
        subjects.push({ id: uid("subj"), name, color, letter, cards: [] });
      }

      saveData();
      renderAll();
      closeSubjectModal();

      // If we were editing the currently open subject, refresh bq screen header
      if (editingSubjectId && editingSubjectId === activeSubjectId) {
        const subj = activeSubject();
        document.getElementById("bqSubjectDot").style.background = subj.color;
        document.getElementById("bqSubjectName").textContent = subj.name;
        document.documentElement.style.setProperty("--subj-accent", subj.color);
      }
    }

    function deleteSubject() {
      if (subjects.length <= 1) { alert("Keep at least one subject."); return; }
      const subj = activeSubject();
      if (!subj) return;
      if (!confirm(`Delete subject "${subj.name}" and all its ${subj.cards.length} question(s)?`)) return;

      const idx = subjects.findIndex(s => s.id === activeSubjectId);
      if (idx !== -1) subjects.splice(idx, 1);
      activeSubjectId = null;
      saveData();
      renderAll();
      showScreen("home");
    }

    // ── Shuffle ──
    function shuffleBoxCards() {
      currentBoxCards = currentBoxCards
        .map(c => ({ c, s: Math.random() }))
        .sort((a, b) => a.s - b.s)
        .map(x => x.c);
      boxCardIndex = 0;
      boxAnswersShown.clear();
      renderBqScreen();
    }

    function toggleBoxGlobalAnswers() {
      boxGlobalAnswersRevealed = !boxGlobalAnswersRevealed;
      boxAnswersShown.clear();
      renderBqScreen();
    }

    function renderAll() {
      renderHome();
    }

    function escapeHtml(v) {
      return String(v).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
    }

    // ── Event listeners ──
    document.getElementById("btnAddSubject").addEventListener("click", () => openSubjectModal(null));
    document.getElementById("btnEditSubject").addEventListener("click", () => openSubjectModal(activeSubjectId));
    document.getElementById("btnDeleteSubject").addEventListener("click", deleteSubject);
    document.getElementById("btnBqBack").addEventListener("click", () => {
      activeSubjectId = null;
      renderHome();
      showScreen("home");
    });

    document.getElementById("btnOneAtTime").addEventListener("click", () => {
      boxMode = 'one';
      boxAnswersShown.clear();
      renderBqScreen();
    });
    document.getElementById("btnAllCards").addEventListener("click", () => {
      boxMode = 'all';
      boxAnswersShown.clear();
      renderBqScreen();
    });

    document.getElementById("btnBoxShuffle").addEventListener("click", shuffleBoxCards);
    document.getElementById("btnBoxToggleAnswers").addEventListener("click", toggleBoxGlobalAnswers);

    document.getElementById("btnBoxPrev").addEventListener("click", () => {
      if (boxCardIndex > 0) { boxCardIndex--; boxAnswersShown.clear(); renderBqScreen(); }
    });
    document.getElementById("btnBoxNext").addEventListener("click", () => {
      if (boxCardIndex < currentBoxCards.length - 1) { boxCardIndex++; boxAnswersShown.clear(); renderBqScreen(); }
    });

    document.getElementById("btnBoxAddCard").addEventListener("click", () => openCardEditor(null));
    document.getElementById("btnBoxEditorSave").addEventListener("click", saveCard);
    document.getElementById("btnBoxEditorCancel").addEventListener("click", closeCardEditor);
    document.getElementById("boxEditorModal").addEventListener("click", e => {
      if (e.target === document.getElementById("boxEditorModal")) closeCardEditor();
    });

    document.getElementById("btnBoxBulkAdd").addEventListener("click", openBulkModal);
    document.getElementById("btnBoxBulkSave").addEventListener("click", saveBulk);
    document.getElementById("btnBoxBulkCancel").addEventListener("click", closeBulkModal);
    document.getElementById("boxBulkModal").addEventListener("click", e => {
      if (e.target === document.getElementById("boxBulkModal")) closeBulkModal();
    });

    document.getElementById("btnSubjectSave").addEventListener("click", saveSubject);
    document.getElementById("btnSubjectCancel").addEventListener("click", closeSubjectModal);
    document.getElementById("subjectModal").addEventListener("click", e => {
      if (e.target === document.getElementById("subjectModal")) closeSubjectModal();
    });

    // ── Init ──
    renderAll();
  </script>
</body>
</html>
